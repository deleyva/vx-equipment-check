name: "Build and Release .deb"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Tauri (.deb only)
        run: npx tauri build --bundles deb

      - name: Get version
        run: echo "PACKAGE_VERSION=$(node -pe "require('./package.json').version")" >> $GITHUB_ENV

      - name: Inject autostart files into .deb
        run: |
          ORIG_DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          echo "📦 Original .deb: $ORIG_DEB"

          # Extract the .deb
          WORKDIR=$(mktemp -d)
          dpkg-deb -R "$ORIG_DEB" "$WORKDIR"

          # Add autostart .desktop
          mkdir -p "$WORKDIR/etc/xdg/autostart"
          cp src-tauri/autostart/vx-dga-pc-check-form.desktop "$WORKDIR/etc/xdg/autostart/"

          # Add icon to pixmaps
          mkdir -p "$WORKDIR/usr/share/pixmaps"
          cp src-tauri/autostart/vx-dga-pc-check-form.png "$WORKDIR/usr/share/pixmaps/"

          # Verify files are in place
          echo "✅ Injected files:"
          ls -la "$WORKDIR/etc/xdg/autostart/"
          ls -la "$WORKDIR/usr/share/pixmaps/"

          # Repack the .deb
          NEW_NAME="vx-dga-pc-check-form_${{ env.PACKAGE_VERSION }}_amd64.deb"
          NEW_PATH="src-tauri/target/release/bundle/deb/$NEW_NAME"
          dpkg-deb -b "$WORKDIR" "$NEW_PATH"
          rm -rf "$WORKDIR"

          echo "📦 Repacked .deb: $NEW_PATH"
          echo "DEB_PATH=$NEW_PATH" >> $GITHUB_ENV
          echo "DEB_NAME=$NEW_NAME" >> $GITHUB_ENV

      - name: Create Release and upload .deb
        uses: softprops/action-gh-release@v2
        with:
          name: "Comprobación de PC Vitalinux v${{ env.PACKAGE_VERSION }}"
          body: |
            🐧 Comprobación de PC Vitalinux v${{ env.PACKAGE_VERSION }}

            Aplicación de verificación de equipos de escritorio para VITALINUX y distribuciones Linux compatibles.

            ## 📦 Instalación

            ```bash
            sudo dpkg -i ${{ env.DEB_NAME }}
            sudo apt install -f  # Instalar dependencias si es necesario
            ```

            ## 🔧 Dependencias del Sistema

            ```bash
            sudo apt install libwebkit2gtk-4.0-37 libgtk-3-0
            ```
          draft: false
          files: ${{ env.DEB_PATH }}
